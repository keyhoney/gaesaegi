<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사용자 프로필</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
<text y='.9em' font-size='90'>👤</text>
</svg>">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="profile-container">
<div class="profile-header">
<div class="profile-picture-container">
<img id="profilePicture" src="img/default-profile.png" alt="프로필 사진" class="profile-picture">
<input type="file" id="pictureUpload" accept="image/*" style="display: none;">
<button id="uploadButton" class="upload-button">📷</button>
</div>
<div class="profile-info">
<h1 id="displayName">사용자 이름</h1>
<p id="email">email@example.com</p>
<button id="editProfileButton" class="btn btn-secondary">프로필 수정</button>
</div>
</div>
<div class="profile-stats">
<div class="stat-card">
<div class="stat-value" id="totalProblems">0</div>
<div class="stat-label">총 문제</div>
</div>
<div class="stat-card">
<div class="stat-value" id="accuracy">0%</div>
<div class="stat-label">정답률</div>
</div>
<div class="stat-card">
<div class="stat-value" id="streak">0일</div>
<div class="stat-label">연속 학습</div>
</div>
<div class="stat-card">
<div class="stat-value" id="level">1</div>
<div class="stat-label">레벨</div>
</div>
</div>
<div class="profile-section">
<h2>🏆 배지 획득</h2>
<div class="badges-grid" id="badgesGrid">
<!-- 배지 획득 표시 -->
</div>
</div>
<div class="profile-section">
<h2>📊 최근 활동</h2>
<ul class="activity-feed" id="activityFeed">
<!-- 최근 활동 목록 -->
</ul>
</div>
<div class="profile-section">
<h2>🪙 코인 거래 내역</h2>
<div class="coin-transactions-container">
<div class="coin-summary">
<div class="coin-balance">
<span class="coin-icon">🪙</span>
<span class="balance-label">현재 사용자 코인:</span>
<span class="balance-value" id="currentCoins">0</span>
</div>
</div>
<div class="transactions-list" id="coinTransactions">
<!-- 코인 거래 내역이 여기에 로딩됩니다 -->
</div>
<div class="no-transactions" id="noTransactions" style="display: none;">
<p>아직 코인 거래 내역이 없습니다.</p>
</div>
</div>
</div>
</div>
<!-- 프로필 수정 모달 -->
<div id="editProfileModal" class="modal" style="display:none;">
<div class="modal-content">
<div class="modal-header">
<h2>프로필 수정</h2>
<span class="modal-close" onclick="closeModal('editProfileModal')">&times;</span>
</div>
<div class="modal-body">
<form id="editProfileForm">
<div class="form-group">
<label for="newDisplayName">이름</label>
<input type="text" id="newDisplayName" class="input" required>
</div>
<button type="submit" class="btn btn-primary">저장</button>
</form>
</div>
</div>
</div>
<script type="module">
import { getFirebaseApp, getFirebaseAuth, getFirebaseDb, getUserCoins, onCoinsChange } from './script.js';
        import { onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
        import { doc, getDoc, updateDoc, collection, query, where, orderBy, limit, getDocs, setDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-storage.js";

        let app, auth, db, storage;

        // Firebase 초기화
        async function initializeFirebaseServices() {
            try {
                app = await getFirebaseApp();
                auth = await getFirebaseAuth();
                db = await getFirebaseDb();
                storage = getStorage(app);
                console.log('Firebase 초기화 성공');
            } catch (error) {
                console.error('Firebase 초기화 실패:', error);
            }
        }

        // Firebase 서비스 초기화 및 인증 가드
        (async () => {
            await initializeFirebaseServices();
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    currentUser = user;
                    await loadUserProfile();
                    try {
                        const userStats = await calculateUserStats();
                        const earnedBadges = await checkAndUpdateBadges(userStats);
                        document.getElementById('totalProblems').textContent = userStats.totalProblems;
                        document.getElementById('accuracy').textContent = `${userStats.averageAccuracy}%`;
                        document.getElementById('streak').textContent = `${userStats.streak}일`;
                        displayBadges(earnedBadges);
                    } catch (error) {
                        console.error('배지 업데이트 오류:', error);
                    }
                } else {
                    window.location.href = 'index.html';
                }
            });
        })();

        let currentUser = null;

        // 배지 데이터 정의
        const badges = {
            'first_problem': { name: '첫 문제', icon: '🎯', description: '첫 번째 문제를 풀었습니다', condition: (stats) => stats.totalProblems >= 1 },
            'perfect_score': { name: '만점', icon: '🏆', description: '100점을 획득했습니다', condition: (stats) => stats.averageAccuracy >= 100 },
            'streak_7': { name: '일주일', icon: '📅', description: '7일 연속 학습', condition: (stats) => stats.streak >= 7 },
            'streak_30': { name: '한달', icon: '🎯', description: '30일 연속 학습', condition: (stats) => stats.streak >= 30 },
            'problem_100': { name: '백문제', icon: '📚', description: '100문제 해결', condition: (stats) => stats.totalProblems >= 100 },
            'accuracy_90': { name: '정확도', icon: '🎯', description: '90% 이상 정답률', condition: (stats) => stats.averageAccuracy >= 90 },
            'speed_demon': { name: '스피드', icon: '⚡', description: '빠른 문제 해결', condition: (stats) => stats.fastAnswers >= 10 },
            'night_owl': { name: '야행성', icon: '🦉', description: '밤에 학습', condition: (stats) => stats.nightStudy >= 5 },
            'early_bird': { name: '아침형', icon: '🐦', description: '아침에 학습', condition: (stats) => stats.morningStudy >= 5 },
            'weekend_warrior': { name: '주말전사', icon: '🏃', description: '주말 학습', condition: (stats) => stats.weekendStudy >= 3 }
        };

        // 사용자 통계 계산 함수
        async function calculateUserStats() {
            try {
                const stats = {
                    totalProblems: 0,
                    correctAnswers: 0,
                    averageAccuracy: 0,
                    streak: 0,
                    fastAnswers: 0,
                    nightStudy: 0,
                    morningStudy: 0,
                    weekendStudy: 0
                };

                // 사용자 프로필에서 기본 통계 가져오기
                const userProfileRef = doc(db, "userProfiles", currentUser.uid);
                const userProfileDoc = await getDoc(userProfileRef);
                
                if (userProfileDoc.exists()) {
                    const userData = userProfileDoc.data();
                    stats.totalProblems = userData.totalProblems || 0;
                    stats.averageAccuracy = userData.averageAccuracy || 0;
                    stats.streak = userData.streak || 0;
                }

                // 활동 데이터에서 추가 통계 계산
                try {
                    const answersQuery = query(
                        collection(db, "answers"),
                        where("userId", "==", currentUser.uid),
                        limit(100)
                    );
                    
                    const snapshot = await getDocs(answersQuery);
                    
                    if (!snapshot.empty) {
                        let totalCorrect = 0;
                        let totalProblems = 0;
                        let fastAnswers = 0;
                        let nightStudy = 0;
                        let morningStudy = 0;
                        let weekendStudy = 0;

                        snapshot.forEach(doc => {
                            const activity = doc.data();
                            totalProblems++;
                            
                            if (activity.isCorrect) {
                                totalCorrect++;
                            }

                            // 빠른 답변 (30초 이내) 체크
                            if (activity.responseTime && activity.responseTime < 30) {
                                fastAnswers++;
                            }

                            // 시간대별 학습 체크
                            if (activity.submittedAt) {
                                const date = activity.submittedAt.toDate ? activity.submittedAt.toDate() : new Date(activity.submittedAt);
                                const hour = date.getHours();
                                const day = date.getDay();

                                if (hour >= 22 || hour <= 6) {
                                    nightStudy++;
                                }
                                if (hour >= 6 && hour <= 9) {
                                    morningStudy++;
                                }
                                if (day === 0 || day === 6) { // 일요일(0) 또는 토요일(6)
                                    weekendStudy++;
                                }
                            }
                        });

                        stats.totalProblems = totalProblems;
                        stats.correctAnswers = totalCorrect;
                        stats.averageAccuracy = totalProblems > 0 ? Math.round((totalCorrect / totalProblems) * 100) : 0;
                        stats.fastAnswers = fastAnswers;
                        stats.nightStudy = nightStudy;
                        stats.morningStudy = morningStudy;
                        stats.weekendStudy = weekendStudy;
                    }
                } catch (error) {
                    console.warn('활동 데이터 로딩 오류 무시:', error);
                }

                return stats;
            } catch (error) {
                console.error('통계 계산 오류:', error);
                return {
                    totalProblems: 0,
                    correctAnswers: 0,
                    averageAccuracy: 0,
                    streak: 0,
                    fastAnswers: 0,
                    nightStudy: 0,
                    morningStudy: 0,
                    weekendStudy: 0
                };
            }
        }

        // 배지 획득 확인 및 업데이트 함수
        async function checkAndUpdateBadges(userStats) {
            try {
                const earnedBadges = [];
                
                // 모든 배지 조건 확인
                Object.keys(badges).forEach(badgeId => {
                    const badge = badges[badgeId];
                    if (badge.condition && badge.condition(userStats)) {
                        earnedBadges.push(badgeId);
                    }
                });

                // 사용자 프로필 업데이트
                const userProfileRef = doc(db, "userProfiles", currentUser.uid);
                await updateDoc(userProfileRef, {
                    badges: earnedBadges,
                    totalProblems: userStats.totalProblems,
                    correctAnswers: userStats.correctAnswers,
                    averageAccuracy: userStats.averageAccuracy,
                    streak: userStats.streak,
                    lastUpdated: serverTimestamp()
                });

                return earnedBadges;
            } catch (error) {
                console.error('배지 업데이트 오류:', error);
                return [];
            }
        }

        

        async function loadUserProfile() {
            try {
                console.log('사용자 프로필 로딩 시작...');
                const userDocRef = doc(db, "userProfiles", currentUser.uid);
                const userDoc = await getDoc(userDocRef);

                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    console.log('사용자 데이터:', userData);
                    
                    document.getElementById('displayName').textContent = userData.displayName || '사용자';
                    document.getElementById('email').textContent = currentUser.email;
                    
                    // 프로필 사진 로딩 및 오류 처리
                    loadProfilePicture(userData.photoURL);
                    
                    // 통계 업데이트
                    document.getElementById('totalProblems').textContent = userData.totalProblems || 0;
                    document.getElementById('accuracy').textContent = `${userData.averageAccuracy || 0}%`;
                    document.getElementById('streak').textContent = `${userData.streak || 0}일`;
                    document.getElementById('level').textContent = userData.level || 1;

                    // 배지 표시
                    displayBadges(userData.badges || []);
                    // 최근 활동 표시
                    loadRecentActivity();
                } else {
                    console.log('사용자 프로필이 존재하지 않습니다. 기본값으로 초기화합니다.');
                    // 사용자 프로필이 없으면 기본값으로 초기화
                    document.getElementById('displayName').textContent = currentUser.displayName || '사용자';
                    document.getElementById('email').textContent = currentUser.email;
                    loadProfilePicture(null);
                    displayBadges([]);
                    loadRecentActivity();
                }
            } catch (error) {
                console.error('프로필 로딩 오류:', error);
                // 오류 발생 시 기본 표시
                document.getElementById('displayName').textContent = currentUser.displayName || '사용자';
                document.getElementById('email').textContent = currentUser.email;
                loadProfilePicture(null);
                displayBadges([]);
                loadRecentActivity();
            }
        }

        function loadProfilePicture(photoURL) {
            const profilePicture = document.getElementById('profilePicture');
            
            if (photoURL) {
                profilePicture.src = photoURL;
                profilePicture.onerror = function() {
                    // 이미지 로딩 실패 시 기본 아바타 표시
                    showDefaultAvatar();
                };
            } else {
                showDefaultAvatar();
            }
        }

        function showDefaultAvatar() {
            const profilePicture = document.getElementById('profilePicture');
            profilePicture.src = 'img/default-profile.png';
            profilePicture.classList.add('error');
        }
        
        function displayBadges(earnedBadgeIds) {
            console.log('배지 표시 시작, earnedBadgeIds:', earnedBadgeIds);
            const badgesGrid = document.getElementById('badgesGrid');
            badgesGrid.innerHTML = '';
            
            // 모든 배지를 순회하며 획득 여부 표시
            Object.keys(badges).forEach(badgeId => {
                const badge = badges[badgeId];
                const isEarned = earnedBadgeIds && earnedBadgeIds.includes(badgeId);
                
                const badgeElement = document.createElement('div');
                badgeElement.className = isEarned ? 'badge-item earned' : 'badge-item locked';
                badgeElement.innerHTML = `
<span class="badge-icon">${isEarned ? badge.icon : '🔒'}</span>
<div>${badge.name}</div>
`;
                badgeElement.title = badge.description;
                badgesGrid.appendChild(badgeElement);
            });
        }

        async function loadRecentActivity() {
            console.log('최근 활동 로딩 시작...');
            const activityFeed = document.getElementById('activityFeed');
            activityFeed.innerHTML = '<li><div class="activity-icon correct">📊</div><div class="activity-content"><div class="activity-title">로딩 중...</div></div></li>';
            
            try {
                console.log('Firestore 쿼리 실행 중...');
                
                // 문서가 없을 경우를 대비해 쿼리 사용
                const answersQuery = query(
                    collection(db, "answers"),
                    where("userId", "==", currentUser.uid),
                    limit(10)
                );
                
                console.log('쿼리 생성 완료, 데이터를 가져오는 중...');
                const snapshot = await getDocs(answersQuery);
                console.log('쿼리 결과:', snapshot.size, '개의 문서');
                
                if (snapshot.empty) {
                    console.log('활동 데이터가 없습니다.');
                    activityFeed.innerHTML = '<li><div class="activity-icon correct">📊</div><div class="activity-content"><div class="activity-title">아직 활동이 없습니다</div><div class="activity-date">첫 번째 문제를 풀어보세요!</div></div></li>';
                    return;
                }
                
                activityFeed.innerHTML = '';
                const activities = [];
                
                snapshot.forEach(doc => {
                    const activity = doc.data();
                    console.log('활동 데이터:', activity);
                    activities.push(activity);
                });
                
                // 날짜순으로 정렬
                activities.sort((a, b) => {
                    const dateA = a.submittedAt?.toDate?.() || new Date(a.submittedAt) || new Date(0);
                    const dateB = b.submittedAt?.toDate?.() || new Date(b.submittedAt) || new Date(0);
                    return dateB - dateA;
                });

                // 코인 거래 내역 로딩
                await loadCoinTransactions();
                
                // 코인 거래 내역 로딩 함수
                async function loadCoinTransactions() {
                    try {
                        // 현재 코인 잔액 로딩 및 실시간 반영
                        try {
                            const coins = await getUserCoins(currentUser.uid);
                            document.getElementById('currentCoins').textContent = coins;
                        } catch (_) {}
                        onCoinsChange(currentUser.uid, (newBalance) => {
                            document.getElementById('currentCoins').textContent = newBalance;
                        });

                        // 코인 거래 내역 로딩
                        const transactions = [];
                        try {
                            const q1 = query(
                                collection(db, 'coin_transactions'),
                                where('userId', '==', currentUser.uid),
                                orderBy('timestamp', 'desc'),
                                limit(20)
                            );
                            const snap1 = await getDocs(q1);
                            snap1.forEach(d => transactions.push({ id: d.id, ...d.data() }));
                        } catch (e) {
                            // 인덱스 없을 때 폴백: where만 사용 후 정렬
                            const q2 = query(
                                collection(db, 'coin_transactions'),
                                where('userId', '==', currentUser.uid)
                            );
                            const snap2 = await getDocs(q2);
                            snap2.forEach(d => transactions.push({ id: d.id, ...d.data() }));
                            transactions.sort((a,b) => {
                                const ta = a.timestamp?.toDate?.() || new Date(a.timestamp);
                                const tb = b.timestamp?.toDate?.() || new Date(b.timestamp);
                                return tb - ta;
                            });
                        }

                        displayCoinTransactions(transactions);
                    } catch (error) {
                        console.error('코인 거래 내역 로딩 실패:', error);
                        document.getElementById('noTransactions').style.display = 'block';
                    }
                }

                function displayCoinTransactions(transactions) {
                    const container = document.getElementById('coinTransactions');
                    const noTransactions = document.getElementById('noTransactions');
                    
                    if (transactions.length === 0) {
                        container.innerHTML = '';
                        noTransactions.style.display = 'block';
                        return;
                    }

                    noTransactions.style.display = 'none';
                    container.innerHTML = transactions.map(transaction => {
                        const isPositive = transaction.type === 'earn';
                        const amountText = isPositive ? `+${transaction.amount}` : `-${transaction.amount}`;
                        const date = transaction.timestamp?.toDate?.() || new Date(transaction.timestamp);
                        
                        return `
<div class="transaction-item">
<div class="transaction-info">
<div class="transaction-icon ${transaction.type}">
${transaction.type === 'earn' ? '🪙' : transaction.type === 'spend' ? '💸' : '📊'}
</div>
<div class="transaction-details">
<div class="transaction-reason">${transaction.reason}</div>
<div class="transaction-date">${date.toLocaleDateString()} ${date.toLocaleTimeString()}</div>
</div>
</div>
<div class="transaction-amount ${isPositive ? 'positive' : 'negative'}">
${amountText} 코인
</div>
</div>
`;
                    }).join('');
                }
                
                activities.slice(0, 10).forEach(activity => {
                    const li = document.createElement('li');
                    
                    let date;
                    try {
                        if (activity.submittedAt && activity.submittedAt.toDate) {
                            date = activity.submittedAt.toDate().toLocaleString('ko-KR', {
                                year: 'numeric',
                                month: 'short',
                                day: 'numeric',
                                hour: '2-digit',
                                minute: '2-digit'
                            });
                        } else if (activity.submittedAt) {
                            date = new Date(activity.submittedAt).toLocaleString('ko-KR', {
                                year: 'numeric',
                                month: 'short',
                                day: 'numeric',
                                hour: '2-digit',
                                minute: '2-digit'
                            });
                        } else {
                            date = new Date().toLocaleString('ko-KR');
                        }
                    } catch (dateError) {
                        console.warn('날짜 변환 오류:', dateError);
                        date = '날짜 정보 없음';
                    }
                    
                    const iconClass = activity.isCorrect ? 'correct' : 'incorrect';
                    const icon = activity.isCorrect ? '✅' : '❌';
                    const resultText = activity.isCorrect ? '정답' : '오답';
                    
                    li.innerHTML = `
<div class="activity-icon ${iconClass}">${icon}</div>
<div class="activity-content">
<div class="activity-title">${activity.questionNumber || '알 수 없는'}번 문제를 풀었습니다 (${resultText})</div>
<div class="activity-date">${date}</div>
</div>
`;
                    activityFeed.appendChild(li);
                });
            } catch (error) {
                console.error('활동 로딩 오류:', error);
                
                // 상황별 맞춤 오류 메시지 표시
                let errorMessage = '활동을 불러올 수 없습니다';
                let errorDetail = '잠시 후 다시 시도해주세요';
                
                if (error.code === 'permission-denied') {
                    errorMessage = '권한이 없습니다';
                    errorDetail = '로그인 상태를 확인해주세요';
                } else if (error.code === 'unavailable') {
                    errorMessage = '서버와 연결할 수 없습니다';
                    errorDetail = '인터넷 연결을 확인해주세요';
                } else if (error.message && error.message.includes('indexes')) {
                    errorMessage = '데이터베이스 인덱스가 설정되지 않았습니다';
                    errorDetail = '관리자에게 문의해주세요';
                }
                
                activityFeed.innerHTML = `
<li>
<div class="activity-icon correct">⚠️</div>
<div class="activity-content">
<div class="activity-title">${errorMessage}</div>
<div class="activity-date">${errorDetail}</div>
</div>
</li>
`;
            }
        }
        
        // 프로필 수정 기능
        document.getElementById('editProfileButton').addEventListener('click', () => {
            document.getElementById('editProfileModal').style.display = 'flex';
            document.getElementById('newDisplayName').value = document.getElementById('displayName').textContent;
        });

        document.getElementById('editProfileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newName = document.getElementById('newDisplayName').value;
            
            try {
                await updateProfile(currentUser, { displayName: newName });
                await updateDoc(doc(db, "userProfiles", currentUser.uid), { displayName: newName });

                document.getElementById('displayName').textContent = newName;
                closeModal('editProfileModal');
                alert('프로필이 업데이트되었습니다!');
            } catch (error) {
                console.error('프로필 업데이트 오류:', error);
                alert('프로필 업데이트에 실패했습니다.');
            }
        });
        
        // 프로필 사진 업로드
        document.getElementById('uploadButton').addEventListener('click', () => document.getElementById('pictureUpload').click());
        document.getElementById('pictureUpload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            try {
                const storageRef = ref(storage, `profilePictures/${currentUser.uid}`);
                await uploadBytes(storageRef, file);
                const photoURL = await getDownloadURL(storageRef);

                await updateProfile(currentUser, { photoURL: photoURL });
                await updateDoc(doc(db, "userProfiles", currentUser.uid), { photoURL: photoURL });
                
                // 프로필 사진 업데이트
                const profilePicture = document.getElementById('profilePicture');
                profilePicture.src = photoURL;
                profilePicture.classList.remove('error');
                profilePicture.textContent = '';
                
                alert('프로필 사진이 업데이트되었습니다!');
            } catch (error) {
                console.error('사진 업로드 오류:', error);
                alert('사진 업로드에 실패했습니다.');
            }
        });

        // 테스트 데이터 생성 버튼 클릭 이벤트
        // document.getElementById('createTestDataBtn').addEventListener('click', createTestData); // 주석

        window.closeModal = (id) => document.getElementById(id).style.display = 'none';
</script>
</body>
</html>
